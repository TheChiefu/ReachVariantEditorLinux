name: Linux Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends software-properties-common
          if ! apt-cache show g++-14 >/dev/null 2>&1; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc-14 \
            g++-14 \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev-tools \
            zlib1g-dev

      - name: Toolchain info
        run: |
          ${CC} --version
          ${CXX} --version
          cmake --version

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${CC} -DCMAKE_CXX_COMPILER=${CXX}

      - name: Build
        run: cmake --build build --config Release

      - name: Stage install
        run: cmake --install build --prefix "${GITHUB_WORKSPACE}/stage"

      - name: Create archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ -z "${VERSION}" ]; then
            VERSION="${GITHUB_SHA::7}"
          fi

          ARCHIVE="ReachVariantTool-linux-x86_64-${VERSION}.tar.gz"
          tar -C stage -czf "${ARCHIVE}" .
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReachVariantTool-linux-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
            build/ReachVariantTool

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
